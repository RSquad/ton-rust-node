# Scan this file for changes every 30 seconds
# https://docs.rs/log4rs/0.8.3/log4rs/encode/pattern/index.html
refresh_rate: 30 seconds

appenders:
  stdout:
    kind: console
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} {l} [{h({t})}] {I}: {m}{n}"

  stdout_ref:
    kind: console
    encoder:
      pattern: "{f}:{L} {l} [{h({t})}] {I}: {m}{n}"

  rolling_logfile:
    kind: rolling_file
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} {l} [{h({t})}] {I}: {m}{n}"
    path: ""
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 5 gb
      roller:
        kind: fixed_window
        pattern: ""
        base: 1
        count: 10

root:
  level: error
  appenders:
    - rolling_logfile

loggers:
  # node messages
  node:
    level: trace
  boot:
    level: info
  sync:
    level: info
  node::network:
    level: info

  # adnl messages
  adnl:
    level: warn
  adnl_query:
    level: warn

  overlay:
    level: warn

  rldp:
    level: warn

  dht:
    level: warn

  # block messages
  ton_block:
    level: off

  # block messages
  executor:
    level: off

  # tvm messages
  tvm:
    level: off

  validator:
    level: info

  validator_manager:
    level: trace

  catchain:
    level: info

  validator_session:
    level: debug

  storage:
    level: info

  telemetry:
    level: trace

  ext_messages:
    level: info

  validate_query:
    level: trace

  simplex:
    level: debug

  quic:
    level: debug

  consensus_adnl_overlay:
    level: debug

