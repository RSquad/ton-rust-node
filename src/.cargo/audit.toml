[advisories]
ignore = [
    # RUSTSEC-2023-0071: Marvin Attack timing side-channel in RSA decryption.
    # Not exploitable here: rsa is only used for encryption (RSA-OAEP wrapping of
    # an AES key with a public key). No decryption is performed.
    # Tracked: NODE-31
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0049: rustls-webpki CRL matching logic bug.
    # Not exploitable here: QUIC transport uses Raw Public Keys (RPK), not X.509
    # certificates with CRLs. Waiting for upstream rustls fix.
    # Tracked: NODE-47
    "RUSTSEC-2026-0049",
]
