name: nodectl release (dry run)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIR: src

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: nodectl-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: nodectl-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: nodectl-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: nodectl-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: nodectl-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --package nodectl --target ${{ matrix.target }}
          else
            cargo build --release --package nodectl --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Rename binary
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src/target/${{ matrix.target }}/release/nodectl.exe ${{ matrix.name }}
          else
            cp src/target/${{ matrix.target }}/release/nodectl ${{ matrix.name }}
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile.nodectl
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
