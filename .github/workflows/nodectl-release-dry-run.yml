name: nodectl release (dry run)

on:
  push:
    branches:
      - feat/nodectl-v0-3-0-migration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIR: src

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: nodectl-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: nodectl-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            name: nodectl-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: nodectl-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: nodectl-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: cargo build --release --package nodectl --target ${{ matrix.target }}
        shell: bash

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile.nodectl
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
